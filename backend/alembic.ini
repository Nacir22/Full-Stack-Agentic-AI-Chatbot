# Configuration Alembic.
# L'URL de base n'est PAS définie ici : elle est injectée dynamiquement depuis
# app.core.config (DATABASE_URL) par alembic/env.py — pas de secret dans ce fichier.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Format des fichiers de version : timestamp + slug lisible.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
