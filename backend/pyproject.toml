# Configuration outils qualité (ruff). Les tests utilisent pytest.ini.

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]
# E501 ignoré : docstrings/commentaires en français parfois longs.
ignore = ["E501", "B008", "UP017"]  # UP017: garde timezone.utc (compat 3.10)

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
